version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sentineltrack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sentineltrack-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sentineltrack-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - sentineltrack-network

  postgres:
    image: postgres:15-alpine
    container_name: sentineltrack-postgres
    environment:
      POSTGRES_DB: sentineltrack
      POSTGRES_USER: sentineltrack
      POSTGRES_PASSWORD: sentineltrack123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sentineltrack-network

  redis:
    image: redis:7-alpine
    container_name: sentineltrack-redis
    ports:
      - "6379:6379"
    networks:
      - sentineltrack-network

volumes:
  postgres-data:

networks:
  sentineltrack-network:
    driver: bridge
